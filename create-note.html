
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Написати записку - Unsaid</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Навігація -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Unsaid</a>
            <ul class="nav-menu">
                <li><a href="index.html">Головна</a></li>
                <li><a href="create-note.html">Написати</a></li>
                <li><a href="search.html">Пошук</a></li>
                <li><a href="random-note.html">Випадкова</a></li>
                <li><a href="archives.html">Архів</a></li>
                <li><a href="about.html">Про проєкт</a></li>
            </ul>
        </div>
    </nav>

    <!-- Сторінка написання записки -->
    <main class="create-note-page">
        <div class="form-container">
            <h1>Напиши записку</h1>
            <p class="subtitle">Поділись своєю думкою з кимось, кого ти хочеш щось сказати</p>

            <form id="noteForm" class="note-form">
                <div class="form-group">
                    <label for="recipientName">Для кого ця записка? *</label>
                    <input 
                        type="text" 
                        id="recipientName" 
                        placeholder="Введи ім'я людини"
                        maxlength="50"
                        required
                    >
                    <small>Вкажи точне ім'я, щоб людина змогла знайти свої записки</small>
                </div>


                <div class="form-group">
                    <label for="noteText">Твоя записка *</label>
                    <textarea 
                        id="noteText" 
                        placeholder="Напиши те, що ти хочеш сказати"
                        rows="10"
                        maxlength="1000"
                        required
                    ></textarea>
                    <div class="char-count"><span id="charCount">0</span>/1000 символів</div>
                </div>

                <div class="form-group form-group-checkbox">
                    <label>
                        <input type="checkbox" id="anonymous" checked>
                        Залишити записку анонімною
                    </label>
                </div>

                <button type="submit" class="btn-primary btn-large">Опублікувати записку</button>
            </form>

        </div>
    </main>

    

    <script src="script.js"></script>
</body>
</html>
